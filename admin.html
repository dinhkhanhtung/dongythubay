<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang Quản Trị Link-in-Bio - YHCT Thu Bẩy</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Config loader -->
  <script src="config.js"></script>

  <style>
    :root {
      --font-primary: 'Outfit', 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --bg-admin: #0b0f19;
      --bg-panel: #151c2c;
      --bg-input: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --color-primary: #22c55e;
      --color-primary-hover: #166534;
      --border-color: rgba(255, 255, 255, 0.08);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-primary);
      background-color: var(--bg-admin);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Login Screen */
    .login-container {
      width: 100%;
      max-width: 400px;
      background-color: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      text-align: center;
      display: block;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-primary), #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px auto;
      color: white;
    }

    .login-logo i {
      width: 36px;
      height: 36px;
    }

    .login-container h1 {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .login-container p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      height: 48px;
      background-color: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0 16px;
      color: white;
      font-family: var(--font-primary);
      font-size: 15px;
      transition: var(--transition);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
    }

    .btn {
      width: 100%;
      height: 48px;
      background-color: var(--color-primary);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: var(--transition);
    }

    .btn:hover {
      background-color: #4ade80;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background-color: var(--bg-input);
      border-color: var(--text-muted);
    }

    /* Admin Panel Dashboard */
    .admin-panel {
      display: none;
      width: 100%;
      max-width: 1000px;
      background-color: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      height: 90vh;
      max-height: 850px;
      flex-direction: column;
    }

    .panel-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(0,0,0,0.15);
    }

    .panel-header h2 {
      font-size: 20px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-header h2 i {
      color: var(--color-primary);
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .panel-body {
      display: flex;
      flex-grow: 1;
      overflow: hidden;
    }

    /* Sidebar Navigation */
    .panel-sidebar {
      width: 240px;
      border-right: 1px solid var(--border-color);
      background-color: rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 8px;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 14px;
      transition: var(--transition);
    }

    .nav-item:hover, .nav-item.active {
      color: white;
      background-color: var(--bg-input);
    }

    .nav-item.active {
      border-left: 4px solid var(--color-primary);
      border-radius: 4px 10px 10px 4px;
    }

    .nav-item i {
      width: 18px;
      height: 18px;
    }

    /* Main Editor Content Area */
    .panel-content {
      flex-grow: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-header {
      border-bottom: 1px dashed var(--border-color);
      padding-bottom: 14px;
      margin-bottom: 10px;
    }

    .section-header h3 {
      font-size: 18px;
      font-weight: 700;
    }

    .section-header p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Editor Cards & Items */
    .editor-card {
      background-color: rgba(0,0,0,0.1);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      position: relative;
    }

    .editor-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .editor-card-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--color-primary);
    }

    .editor-card-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: var(--transition);
    }

    .icon-btn:hover {
      color: white;
      border-color: var(--text-muted);
      background-color: var(--bg-input);
    }

    .icon-btn.btn-delete:hover {
      color: #ef4444;
      border-color: #ef4444;
      background-color: rgba(239, 68, 68, 0.08);
    }

    /* Form Fields Grid */
    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 768px) {
      .field-grid {
        grid-template-columns: 1fr;
      }
      .admin-panel {
        height: 100vh;
        max-height: 100%;
        border-radius: 0;
      }
      .panel-body {
        flex-direction: column;
      }
      .panel-sidebar {
        width: 100%;
        height: auto;
        flex-direction: row;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        padding: 8px;
      }
      .nav-item {
        padding: 8px 12px;
        white-space: nowrap;
      }
    }

    /* Modal / Progress Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(11, 15, 25, 0.85);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .progress-box {
      width: 90%;
      max-width: 400px;
      background-color: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.05);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      margin: 0 auto 20px auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .progress-box h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .progress-box p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .countdown {
      font-size: 32px;
      font-weight: 800;
      color: var(--color-primary);
      margin-top: 14px;
    }
  </style>
</head>
<body>

  <!-- Screen 1: Login Form -->
  <div id="login-screen" class="login-container">
    <div class="login-logo">
      <i data-lucide="lock"></i>
    </div>
    <h1>Đông y Thu Bẩy</h1>
    <p>Trang Quản Trị Hệ Thống Link-in-Bio</p>
    <div class="form-group">
      <label for="admin-password">Mật khẩu bảo mật</label>
      <input type="password" id="admin-password" class="form-input" placeholder="Nhập mật khẩu Admin của bạn...">
    </div>
    <button id="btn-login" class="btn">
      <span>Đăng Nhập</span>
      <i data-lucide="log-in"></i>
    </button>
  </div>

  <!-- Screen 2: Admin Dashboard Panel -->
  <div id="admin-dashboard" class="admin-panel">
    <div class="panel-header">
      <h2><i data-lucide="settings"></i> Quản Trị Dữ Liệu Linktree</h2>
      <div class="header-actions">
        <button id="btn-save" class="btn" style="width: auto; padding: 0 20px;">
          <i data-lucide="cloud-lightning"></i>
          <span>Lưu & Deploy Web</span>
        </button>
        <button id="btn-logout" class="btn btn-secondary" style="width: auto; padding: 0 16px;">
          <i data-lucide="log-out"></i>
        </button>
      </div>
    </div>

    <div class="panel-body">
      <!-- Sidebar navigation tabs -->
      <div class="panel-sidebar">
        <div class="nav-item active" data-tab="profile"><i data-lucide="user"></i> Profile cá nhân</div>
        <div class="nav-item" data-tab="socials"><i data-lucide="share-2"></i> Mạng xã hội</div>
        <div class="nav-item" data-tab="my-apps"><i data-lucide="layout-grid"></i> Ứng dụng/Web App</div>
        <div class="nav-item" data-tab="affiliates"><i data-lucide="shopping-bag"></i> Sản phẩm khuyên dùng</div>
        <div class="nav-item" data-tab="payment"><i data-lucide="wallet"></i> Thông tin Donate</div>
      </div>

      <!-- Main Editor Container -->
      <div id="editor-container" class="panel-content">
        <!-- Dynamically loaded editors by JS -->
      </div>
    </div>
  </div>

  <!-- Screen 3: Progress & Deploying Overlay -->
  <div id="deploy-overlay" class="overlay">
    <div class="progress-box">
      <div class="spinner" id="spinner-loader"></div>
      <h3 id="deploy-title">Đang đồng bộ dữ liệu...</h3>
      <p id="deploy-desc">Quá trình này sẽ mất khoảng vài giây để gửi dữ liệu lên máy chủ.</p>
      <div id="deploy-countdown" class="countdown" style="display: none;">25</div>
    </div>
  </div>

  <!-- Logic scripts -->
  <script>
    // No hardcoded API keys/tokens or passwords - all authentication and storage
    // is securely handled by Vercel Serverless Functions in process.env
    let adminPassword = '';
    let localConfig = null;
    let currentTab = 'profile';

    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();

      // Set up click events
      document.getElementById('btn-login').addEventListener('click', handleLogin);
      document.getElementById('admin-password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
      document.getElementById('btn-logout').addEventListener('click', handleLogout);
      document.getElementById('btn-save').addEventListener('click', saveConfigToGithub);

      // Tab navigation
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        item.addEventListener('click', () => {
          navItems.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          currentTab = item.getAttribute('data-tab');
          renderEditor();
        });
      });

      // Check auto-login from localstorage
      const savedPwd = localStorage.getItem('admin_logged_pwd');
      if (savedPwd) {
        adminPassword = savedPwd;
        showDashboard();
      }
    });

    async function handleLogin() {
      const pwd = document.getElementById('admin-password').value;
      if (!pwd) return alert('Vui lòng nhập mật khẩu!');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });

        const data = await res.json();
        
        if (res.ok && data.success) {
          adminPassword = pwd;
          localStorage.setItem('admin_logged_pwd', pwd);
          showDashboard();
        } else {
          alert(data.error || 'Mật khẩu bảo mật không chính xác!');
        }
      } catch (err) {
        console.error(err);
        alert('Lỗi kết nối đến máy chủ xác thực.');
      }
    }

    function handleLogout() {
      localStorage.removeItem('admin_logged_pwd');
      adminPassword = '';
      document.getElementById('admin-dashboard').style.display = 'none';
      document.getElementById('login-screen').style.display = 'block';
      document.body.style.alignItems = 'center';
    }

    function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-dashboard').style.display = 'flex';
      document.body.style.alignItems = 'stretch';
      
      // Load config
      if (window.CONFIG) {
        localConfig = JSON.parse(JSON.stringify(window.CONFIG)); // Deep copy
        renderEditor();
      } else {
        alert('Không tải được cấu hình từ file config.js');
      }
    }

    // --- RENDER EDITOR TABS ---
    function renderEditor() {
      const container = document.getElementById('editor-container');
      container.innerHTML = '';

      if (currentTab === 'profile') {
        renderProfileTab(container);
      } else if (currentTab === 'socials') {
        renderSocialsTab(container);
      } else if (currentTab === 'my-apps') {
        renderItemsTab(container, 'my-apps', 'Ứng dụng / Web App', 'Chỉ cần điền URL, hệ thống sẽ tự động lấy ảnh và mô tả từ liên kết.');
      } else if (currentTab === 'affiliates') {
        renderItemsTab(container, 'affiliates', 'Sản phẩm khuyên dùng', 'Hiển thị dạng Shopee Grid 2 cột. Chỉ cần điền URL, hệ thống tự cào thông tin.');
      } else if (currentTab === 'payment') {
        renderPaymentTab(container);
      }

      // Reinitialize icons
      lucide.createIcons();
    }

    // TAB: Profile
    function renderProfileTab(container) {
      const profile = localConfig.profile;
      
      container.innerHTML = `
        <div class="section-header">
          <h3>Thông Tin Profile Cá Nhân</h3>
          <p>Hiển thị ở đầu trang Link-in-Bio giới thiệu bản thân.</p>
        </div>
        <div class="editor-card">
          <div class="form-group">
            <label>Link ảnh đại diện (Avatar)</label>
            <input type="text" id="prof-avatar" class="form-input" value="${profile.avatar || ''}">
          </div>
          <div class="field-grid">
            <div class="form-group">
              <label>Tên hiển thị</label>
              <input type="text" id="prof-name" class="form-input" value="${profile.name || ''}">
            </div>
            <div class="form-group">
              <label>Chức danh y khoa</label>
              <input type="text" id="prof-title" class="form-input" value="${profile.title || ''}">
            </div>
          </div>
          <div class="field-grid">
            <div class="form-group">
              <label>Thầy thuốc phụ trách</label>
              <input type="text" id="prof-subtitle" class="form-input" value="${profile.subtitle || ''}">
            </div>
            <div class="form-group">
              <label>Handle TikTok (ví dụ: @dongy_thubay)</label>
              <input type="text" id="prof-tiktok" class="form-input" value="${profile.tiktokHandle || ''}">
            </div>
          </div>
          <div class="form-group">
            <label>Mô tả ngắn (Bio)</label>
            <textarea id="prof-bio" class="form-input" style="height: 100px; padding: 12px; resize: none;">${profile.bio || ''}</textarea>
          </div>
        </div>

        <div class="section-header" style="margin-top: 10px;">
          <h3>Cấu hình SEO / Open Graph</h3>
          <p>Thiết lập thông tin hiển thị khi chia sẻ link lên Facebook/TikTok/Zalo.</p>
        </div>
        <div class="editor-card">
          <div class="form-group">
            <label>Tiêu đề trang (SEO Title)</label>
            <input type="text" id="seo-title" class="form-input" value="${localConfig.seo.title || ''}">
          </div>
          <div class="form-group">
            <label>Mô tả trang (SEO Description)</label>
            <input type="text" id="seo-desc" class="form-input" value="${localConfig.seo.description || ''}">
          </div>
        </div>
      `;

      // Bind real-time inputs to localConfig
      document.getElementById('prof-avatar').addEventListener('input', (e) => profile.avatar = e.target.value);
      document.getElementById('prof-name').addEventListener('input', (e) => profile.name = e.target.value);
      document.getElementById('prof-title').addEventListener('input', (e) => profile.title = e.target.value);
      document.getElementById('prof-subtitle').addEventListener('input', (e) => profile.subtitle = e.target.value);
      document.getElementById('prof-tiktok').addEventListener('input', (e) => profile.tiktokHandle = e.target.value);
      document.getElementById('prof-bio').addEventListener('input', (e) => profile.bio = e.target.value);
      document.getElementById('seo-title').addEventListener('input', (e) => localConfig.seo.title = e.target.value);
      document.getElementById('seo-desc').addEventListener('input', (e) => localConfig.seo.description = e.target.value);
    }

    // TAB: Social Links
    function renderSocialsTab(container) {
      const secIndex = localConfig.sections.findIndex(s => s.id === 'socials');
      const section = localConfig.sections[secIndex];

      container.innerHTML = `
        <div class="section-header">
          <h3>Kênh Mạng Xã Hội</h3>
          <p>Hiển thị các nút liên kết kết nối nhanh dạng lưới 2 cột.</p>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <span style="font-size: 14px; font-weight: 700; color: var(--text-muted);">Danh sách mạng xã hội (${section.items.length})</span>
          <button id="add-social" class="btn" style="width: auto; height: 36px; padding: 0 16px; font-size: 13px;">
            <i data-lucide="plus"></i> Thêm liên kết
          </button>
        </div>
        <div id="socials-list"></div>
      `;

      const listDiv = document.getElementById('socials-list');
      
      const renderSocialItems = () => {
        listDiv.innerHTML = '';
        section.items.forEach((item, index) => {
          const card = document.createElement('div');
          card.className = 'editor-card';
          card.innerHTML = `
            <div class="editor-card-header">
              <span class="editor-card-title">Liên kết #${index + 1}</span>
              <div class="editor-card-actions">
                <button class="icon-btn btn-up" data-index="${index}"><i data-lucide="arrow-up"></i></button>
                <button class="icon-btn btn-down" data-index="${index}"><i data-lucide="arrow-down"></i></button>
                <button class="icon-btn btn-delete" data-index="${index}"><i data-lucide="trash-2"></i></button>
              </div>
            </div>
            <div class="field-grid">
              <div class="form-group">
                <label>Platform (zalo, messenger, facebook, tiktok, maps...)</label>
                <input type="text" class="form-input inp-platform" value="${item.platform || ''}" data-index="${index}">
              </div>
              <div class="form-group">
                <label>Nhãn nút bấm</label>
                <input type="text" class="form-input inp-label" value="${item.label || ''}" data-index="${index}">
              </div>
            </div>
            <div class="field-grid">
              <div class="form-group">
                <label>Liên kết (URL)</label>
                <input type="text" class="form-input inp-url" value="${item.url || ''}" data-index="${index}">
              </div>
              <div class="form-group">
                <label>Icon URL (HD)</label>
                <input type="text" class="form-input inp-icon" value="${item.icon || ''}" data-index="${index}">
              </div>
            </div>
          `;

          // Add listeners
          card.querySelector('.inp-platform').addEventListener('input', (e) => {
            section.items[index].platform = e.target.value;
          });
          card.querySelector('.inp-label').addEventListener('input', (e) => {
            section.items[index].label = e.target.value;
          });
          card.querySelector('.inp-url').addEventListener('input', (e) => {
            section.items[index].url = e.target.value;
          });
          card.querySelector('.inp-icon').addEventListener('input', (e) => {
            section.items[index].icon = e.target.value;
          });

          // Delete link
          card.querySelector('.btn-delete').addEventListener('click', () => {
            if (confirm('Bạn muốn xóa liên kết mạng xã hội này?')) {
              section.items.splice(index, 1);
              renderSocialItems();
            }
          });

          // Reorder up
          card.querySelector('.btn-up').addEventListener('click', () => {
            if (index > 0) {
              const temp = section.items[index];
              section.items[index] = section.items[index - 1];
              section.items[index - 1] = temp;
              renderSocialItems();
            }
          });

          // Reorder down
          card.querySelector('.btn-down').addEventListener('click', () => {
            if (index < section.items.length - 1) {
              const temp = section.items[index];
              section.items[index] = section.items[index + 1];
              section.items[index + 1] = temp;
              renderSocialItems();
            }
          });

          listDiv.appendChild(card);
        });
        
        lucide.createIcons();
      };

      // Add social link click
      document.getElementById('add-social').addEventListener('click', () => {
        section.items.push({ platform: 'new', label: 'Tên liên kết mới', url: 'https://', icon: '' });
        renderSocialItems();
      });

      renderSocialItems();
    }

    // TAB: Generic Items (Apps & Products)
    function renderItemsTab(container, sectionId, titleName, descText) {
      const secIndex = localConfig.sections.findIndex(s => s.id === sectionId);
      const section = localConfig.sections[secIndex];

      container.innerHTML = `
        <div class="section-header">
          <h3>${titleName}</h3>
          <p>${descText}</p>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <span style="font-size: 14px; font-weight: 700; color: var(--text-muted);">Danh sách các item (${section.items.length})</span>
          <button id="add-item" class="btn" style="width: auto; height: 36px; padding: 0 16px; font-size: 13px;">
            <i data-lucide="plus"></i> Thêm item
          </button>
        </div>
        <div id="items-list"></div>
      `;

      const listDiv = document.getElementById('items-list');

      const renderItemsList = () => {
        listDiv.innerHTML = '';
        section.items.forEach((item, index) => {
          const card = document.createElement('div');
          card.className = 'editor-card';
          
          let specificFieldsHtml = '';
          
          if (sectionId === 'my-apps') {
            specificFieldsHtml = `
              <div class="field-grid">
                <div class="form-group">
                  <label>Đường dẫn App (previewUrl) - *Bắt buộc</label>
                  <input type="text" class="form-input inp-preview-url" value="${item.previewUrl || ''}" data-index="${index}">
                </div>
                <div class="form-group">
                  <label>Tag giới thiệu (ví dụ: Gia phả, Sức khỏe...)</label>
                  <input type="text" class="form-input inp-tag" value="${item.tag || ''}" data-index="${index}">
                </div>
              </div>
            `;
          } else if (sectionId === 'affiliates') {
            specificFieldsHtml = `
              <div class="form-group">
                <label>Đường dẫn mua hàng (affiliateUrl) - *Bắt buộc</label>
                <input type="text" class="form-input inp-affiliate-url" value="${item.affiliateUrl || ''}" data-index="${index}">
              </div>
              <div class="field-grid">
                <div class="form-group">
                  <label>Giá bán (priceNote)</label>
                  <input type="text" class="form-input inp-price" value="${item.priceNote || ''}" data-index="${index}">
                </div>
                <div class="form-group">
                  <label>Nhãn nút bấm (ctaLabel)</label>
                  <input type="text" class="form-input inp-cta-label" value="${item.ctaLabel || ''}" data-index="${index}">
                </div>
              </div>
              <div class="form-group">
                <label>Ưu đãi / Chiết khấu (discountNote)</label>
                <input type="text" class="form-input inp-discount" value="${item.discountNote || ''}" data-index="${index}">
              </div>
            `;
          }

          card.innerHTML = `
            <div class="editor-card-header">
              <span class="editor-card-title">${sectionId === 'my-apps' ? 'Ứng dụng' : 'Sản phẩm'} #${index + 1}</span>
              <div class="editor-card-actions">
                <button class="icon-btn btn-up" data-index="${index}"><i data-lucide="arrow-up"></i></button>
                <button class="icon-btn btn-down" data-index="${index}"><i data-lucide="arrow-down"></i></button>
                <button class="icon-btn btn-delete" data-index="${index}"><i data-lucide="trash-2"></i></button>
              </div>
            </div>
            ${specificFieldsHtml}
            <p style="font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 4px;">
              Các trường Tên, Mô tả, Hình ảnh được tự động cào từ đường dẫn sau khi lưu.
            </p>
          `;

          // Add field listeners
          if (sectionId === 'my-apps') {
            card.querySelector('.inp-preview-url').addEventListener('input', (e) => {
              section.items[index].previewUrl = e.target.value;
            });
            card.querySelector('.inp-tag').addEventListener('input', (e) => {
              section.items[index].tag = e.target.value;
            });
          } else if (sectionId === 'affiliates') {
            card.querySelector('.inp-affiliate-url').addEventListener('input', (e) => {
              section.items[index].affiliateUrl = e.target.value;
            });
            card.querySelector('.inp-price').addEventListener('input', (e) => {
              section.items[index].priceNote = e.target.value;
            });
            card.querySelector('.inp-cta-label').addEventListener('input', (e) => {
              section.items[index].ctaLabel = e.target.value;
            });
            card.querySelector('.inp-discount').addEventListener('input', (e) => {
              section.items[index].discountNote = e.target.value;
            });
          }

          // Order & delete listeners
          card.querySelector('.btn-delete').addEventListener('click', () => {
            if (confirm('Bạn có chắc muốn xóa item này?')) {
              section.items.splice(index, 1);
              renderItemsList();
            }
          });

          card.querySelector('.btn-up').addEventListener('click', () => {
            if (index > 0) {
              const temp = section.items[index];
              section.items[index] = section.items[index - 1];
              section.items[index - 1] = temp;
              renderItemsList();
            }
          });

          card.querySelector('.btn-down').addEventListener('click', () => {
            if (index < section.items.length - 1) {
              const temp = section.items[index];
              section.items[index] = section.items[index + 1];
              section.items[index + 1] = temp;
              renderItemsList();
            }
          });

          listDiv.appendChild(card);
        });

        lucide.createIcons();
      };

      document.getElementById('add-item').addEventListener('click', () => {
        if (sectionId === 'my-apps') {
          section.items.push({ previewUrl: 'https://', tag: 'Web App' });
        } else {
          section.items.push({ affiliateUrl: 'https://', priceNote: '', discountNote: '', ctaLabel: 'Mua trên TikTok' });
        }
        renderItemsList();
      });

      renderItemsList();
    }

        document.getElementById('bank-qr-url').value = `https://img.vietqr.io/image/bidv-${section.accountNumber}-compact2.jpg?amount=0&addInfo=Donate%20Dong%20y%20Thu%20Bay&accountName=${cleanName}`;
        section.qrUrl = document.getElementById('bank-qr-url').value;
      });
      document.getElementById('bank-qr-url').addEventListener('input', (e) => section.qrUrl = e.target.value);
      document.getElementById('bank-note').addEventListener('input', (e) => section.note = e.target.value);

    // --- SECURE SAVE TO SERVERLESS FUNCTION ---
    async function saveConfigToGithub() {
      const overlay = document.getElementById('deploy-overlay');
      const title = document.getElementById('deploy-title');
      const desc = document.getElementById('deploy-desc');
      const countdownBox = document.getElementById('deploy-countdown');
      const spinner = document.getElementById('spinner-loader');

      overlay.classList.add('show');
      title.textContent = 'Đang đóng gói cấu hình...';
      desc.textContent = 'Hệ thống đang chuyển đổi dữ liệu thành mã JavaScript và gửi lên máy chủ bảo mật.';
      spinner.style.display = 'block';
      countdownBox.style.display = 'none';

      // 1. Generate config.js content string
      const fileContent = `// File cấu hình Link-in-Bio - YHCT Thu Bẩy (Đinh Khánh Tùng)
// Chỉnh sửa các trường dưới đây để thay đổi nội dung trang web mà không cần động vào code giao diện.
window.CONFIG = ${JSON.stringify(localConfig, null, 2)};
`;

      try {
        // 2. Send config to Serverless Function
        title.textContent = 'Gửi dữ liệu lên máy chủ...';
        
        const response = await fetch('/api/save-config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: adminPassword,
            configContent: fileContent
          })
        });

        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Gửi dữ liệu lên máy chủ thất bại.');
        }

        // 3. Update local in-memory CONFIG variable to prevent desync
        window.CONFIG = JSON.parse(JSON.stringify(localConfig));

        // 4. Trigger deployment countdown (Vercel automatic deployment)
        title.textContent = 'Web đang tự động deploy...';
        spinner.style.display = 'none';
        countdownBox.style.display = 'block';
        
        let counter = 25;
        countdownBox.textContent = counter;
        
        const interval = setInterval(() => {
          counter--;
          countdownBox.textContent = counter;
          desc.textContent = `Thay đổi đã được ghi nhận. Bản deploy mới trên Vercel sẽ sẵn sàng sau ${counter} giây nữa.`;
          
          if (counter <= 0) {
            clearInterval(interval);
            overlay.classList.remove('show');
            alert('Cập nhật dữ liệu thành công! Trang web của bạn đã được cập nhật bản mới nhất trên Internet.');
          }
        }, 1000);

      } catch (err) {
        overlay.classList.remove('show');
        console.error(err);
        alert(`Đã xảy ra lỗi: ${err.message || 'Không rõ nguyên nhân.'}`);
      }
    }
  </script>
